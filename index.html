<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>作品集 Portfolio</title>
    <meta
      name="description"
      content="一个简洁、高级、可按文件夹维护内容并导出 PDF 的个人作品集网页。"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a class="brand" href="#top" aria-label="返回顶部">
          <span class="brand-mark">P</span>
          <span class="brand-text">Portfolio</span>
        </a>
        <nav class="nav" aria-label="作品分类" id="categoryNav"></nav>
        <button class="print-button" type="button" id="printButton" aria-label="导出 PDF">
          <span aria-hidden="true">PDF</span>
        </button>
      </div>
    </header>

    <main id="top">
      <section class="hero">
        <div class="hero-copy">
          <p class="eyebrow" id="heroEyebrow">Selected Works</p>
          <h1 id="profileName">你的名字</h1>
          <p class="hero-summary" id="profileIntro">
            一个用于展示图片作品、项目说明与分类归档的作品集网页。
          </p>
        </div>
        <div class="hero-visual" id="heroVisual" aria-label="首页作品图"></div>
      </section>

      <aside class="profile-panel" aria-label="个人信息">
        <dl id="profileMeta"></dl>
      </aside>

      <section class="toolbar" aria-label="筛选工具">
        <div>
          <p class="section-kicker">Works</p>
          <h2>作品目录</h2>
        </div>
        <div class="filter-tabs" id="filterTabs" role="tablist" aria-label="按分类筛选"></div>
      </section>

      <section class="works-grid" id="worksGrid" aria-live="polite"></section>
      <section class="empty-state" id="emptyState" hidden>
        <p>还没有扫描到作品图片。请把图片放进 <code>content/分类名/作品名/</code>，然后运行 <code>npm run build</code>。</p>
      </section>
    </main>

    <footer class="site-footer">
      <p id="footerText">© Portfolio</p>
    </footer>

    <script src="portfolio-data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
